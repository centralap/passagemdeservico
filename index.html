<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CME - PASSAGEM DE SERVIÇO - Checklist</title>

<style>
body{
font-family: 'Segoe UI', Arial, sans-serif;
margin:15px;
font-size:13px;
background:#111827;
color:#e5e7eb;

width:100%;
max-width:1400px;
margin:auto;
padding:10px;
}

.header{
text-align:center;
margin-bottom:10px;
}

.header img{
width:90px;
margin-bottom:5px;
filter:grayscale(20%) contrast(110%);
}

h2{
margin:5px 0;
font-weight:600;
letter-spacing:1px;
color:#f9fafb;
}

fieldset{
border:1px solid #374151;
padding:10px;
margin-bottom:12px;
border-radius:6px;
background:#1f2933;
}

legend{
font-weight:bold;
padding:0 8px;
color:#22c55e;
}

.toolbar{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-bottom:8px;
}

button{
padding:6px 10px;
cursor:pointer;
border:none;
border-radius:4px;
background:#374151;
color:#f9fafb;
font-weight:500;
transition:0.2s;
}

button:hover{
background:#4b5563;
}

.checklist{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px 20px;
min-width:600px;
}

.checklist.one{
grid-template-columns:1fr;
}

.item{
display:grid;
grid-template-columns:1fr 80px;
align-items:center;
gap:6px;
border-bottom:1px solid #374151;
padding:3px 0;
}

.item label{
display:flex;
align-items:center;
gap:10px;
}

input[type="checkbox"]{
transform:scale(1.3);
cursor:pointer;
}

input, textarea{
border:1px solid #374151;
border-radius:4px;
padding:4px;
font-size:12px;
background:#111827;
color:#e5e7eb;
max-width:100%;
box-sizing:border-box;
}

.item input[type="text"]{
width:120px;
}

input[type="number"], input[type="text"]{
min-height:22px;
}

input:focus, textarea:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 3px rgba(34,197,94,0.4);
}

.viaturas-grid{
display:grid;
gap:6px;
min-width:600px;
}

.v-item{
display:grid;
grid-template-columns:150px 1fr 150px 1fr;
align-items:center;
gap:6px;
border-bottom:1px solid #374151;
padding:4px 0;
}

/* ===== TEXTAREA AJUSTADO ===== */
textarea{
width:100%;
min-height:180px;
resize:vertical;
}

#textoFinal{
min-height:180px;
max-height:300px;
overflow:auto;
}

/* ===== IMPRESSÃO ===== */
@media print{

@page{
size:A4;
margin:5mm;
}

body{
background:#fff;
color:#000;
font-size:10px;
margin:0;
max-width:90%;
}

.header img{
width:50px;
}

h2{
font-size:14px;
margin:2px 0;
}

fieldset{
margin-bottom:4px;
padding:4px;
border:1px solid #999;
background:#fff;
}

legend{
font-size:11px;
}

.item{
grid-template-columns:1fr 50px;
padding:1px 0;
}

.v-item{
grid-template-columns:90px 1fr 90px 1fr;
padding:1px 0;
}

input, textarea{
font-size:10px;
padding:1px;
}

textarea{
height:80px;
}

button, .toolbar{
display:none;
}

}
</style>
</head>
<body>

<div class="header">
<img src="logo-pp.png">
<h2>CME - PASSAGEM DE SERVIÇO</h2>
</div>

<fieldset>
<legend>Data e Hora</legend>

<div class="item">
<label>Data</label>
<input type="text" id="data">
</div>

<div class="item">
<label>Hora</label>
<input type="text" id="hora">
</div>

</fieldset>

<fieldset>
<legend>MATERIAL CARGA</legend>

<div class="toolbar">
<button onclick="duasColunas()">2 Colunas</button>
<button onclick="umaColuna()">1 Coluna</button>
<button onclick="marcarTodos()">Marcar todos</button>
<button onclick="limparTodos()">Limpar</button>
</div>

<div class="checklist" id="lista">

<div class="item"><label><input type="checkbox">Tornozeleira Eletrônica</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Carregador (TNZ)</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Pulseiras (TNZ)</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Trava da Pulseira</label><input type="text"></div>
<div class="item"><label><input type="checkbox">Pulseiras de Teste</label><input type="number"></div>
<div class="item"><label><input type="checkbox">DPPs Completos (Dispositivo + Carregador)</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Carregador DPP Avulso</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Smartphones com CHIP (01 Motorola + 02 Redmi)</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Carregador de Celular</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Garrafões de Água</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Garrafão Cheio</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Garrafão Vazio</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Garrafão Plantão</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Garrafão ADM</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Algemas</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Chave de Algema</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Chave da Sala - Estado Maior</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Balança</label><input type="number"></div>
<div class="item"><label><input type="checkbox">Termômetro</label><input type="number"></div>

</div>
</fieldset>

<fieldset>
<legend>VIATURAS</legend>

<div class="viaturas-grid">

<div class="v-item">
<label>YARIS/TOYOTA KM:</label>
<input type="number">
<label>YARIS COMBUSTÍVEL.:</label>
<input type="text">
</div>

<div class="v-item">
<label>L200/MITSUBISHI KM:</label>
<input type="number">
<label>L200 COMBUSTÍVEL.:</label>
<input type="text">
</div>

<div class="v-item">
<label>KWID/RENAULT KM:</label>
<input type="number">
<label>KWID COMBUSTÍVEL.:</label>
<input type="text">
</div>

</div>
</fieldset>

<script>
let edicaoManual = false;

function atualizarDataHora(){
const agora=new Date();

const dia=String(agora.getDate()).padStart(2,'0');
const mes=String(agora.getMonth()+1).padStart(2,'0');
const ano=agora.getFullYear();

const hora=String(agora.getHours()).padStart(2,'0');
const min=String(agora.getMinutes()).padStart(2,'0');

document.getElementById('data').value=`${dia}/${mes}/${ano}`;
document.getElementById('hora').value=`${hora}:${min}`;

if(typeof gerarTexto === 'function') gerarTexto();
}

window.onload=function(){
atualizarDataHora();
setInterval(atualizarDataHora,60000);

document.querySelectorAll('.checklist input, .v-item input')
.forEach(el => el.addEventListener('input', gerarTexto));

document.getElementById('textoFinal').addEventListener('input', ()=>{
edicaoManual = true;
});
}

function umaColuna(){ document.getElementById('lista').classList.add('one'); }
function duasColunas(){ document.getElementById('lista').classList.remove('one'); }

function marcarTodos(){
document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=true);
gerarTexto();
}

function limparTodos(){
document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);
gerarTexto();
}

function gerarTexto(){
let partes=[];
let viaturas=[];

document.querySelectorAll('.checklist .item').forEach(item=>{
const label=item.querySelector('label').innerText.trim();
const input=item.querySelector('input[type=number],input[type=text]');
if(input && input.value){
partes.push(label+': '+input.value);
}
});

const mapaViaturas = {
L200: 'L200/MITSUBISHI',
YARIS: 'YARIS/TOYOTA',
KWID: 'KWID/RENAULT'
};

document.querySelectorAll('.v-item').forEach(v=>{
const labels=v.querySelectorAll('label');
const inputs=v.querySelectorAll('input');

let nomeBase = labels[0].innerText.split(' ')[0];
let nomeViatura = mapaViaturas[nomeBase] || nomeBase;

let km = inputs[0].value;
let comb = inputs[1].value;

if(km || comb){

let linha = nomeViatura + ' — ';

if(nomeViatura === 'YARIS/TOYOTA'){
linha += '01 ESTEPE + 01 CHAVE DE RODA + 01 MACACO + 01 TRIÂNGULO';
if(km || comb) linha += ' — ';
}

let partesLinha=[];
if(km) partesLinha.push('KM: ' + km);
if(comb) partesLinha.push('COMB: ' + comb);

viaturas.push(linha + partesLinha.join(', '));
}
});

let texto = 'MATERIAL DISPONÍVEL NA PASSAGEM DO SERVIÇO: ';
texto += partes.join(', ');

if(viaturas.length>0){
texto += '\n\nVIATURAS NA PASSAGEM DO SERVIÇO: ' + viaturas.join(', ');
}

if(!edicaoManual){
document.getElementById('textoFinal').value = texto;
}
}
</script>

<fieldset>
<legend>Texto Gerado Automático</legend>

<div class="toolbar">
<button onclick="edicaoManual=false; gerarTexto()">Gerar Texto</button>
</div>

<textarea id="textoFinal"></textarea>

</fieldset>

</body>
</html>
